<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MovieApp</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Genres</a></li>
                <li><a href="#">Top Rated</a></li>
                <li><a href="#">Now Playing</a></li>
            </ul>
        </nav>
    </header>

    <section class="banner">
        <div class="banner-content">
            <h1>Discover Your Next Favorite Movie</h1>
            <p>Explore the world of movies and TV shows.</p>
            <button>Browse Movies</button>
        </div>
    </section>

    <section class="movie-list">
        <h2>Trending Movies</h2>
        <div class="movies">
            <div class="movie-card">
                <img src="movie1.jpg" alt="Movie 1">
                <h3>Movie Title 1</h3>
            </div>
            <div class="movie-card">
                <img src="movie2.jpg" alt="Movie 2">
                <h3>Movie Title 2</h3>
            </div>
            <div class="movie-card">
                <img src="movie3.jpg" alt="Movie 3">
                <h3>Movie Title 3</h3>
            </div>
            <div class="movie-card">
                <img src="movie4.jpg" alt="Movie 4">
                <h3>Movie Title 4</h3>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
    <section class="movie-list">
        <div class="movies">
          <!-- Movies will be inserted here -->
        </div>
      </section>
      
    <footer>
        <p>&copy; 2025 MovieApp, All Rights Reserved</p>
    </footer>
</body>
</html>
