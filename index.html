<!DOCTYPE html>
<html lang="en">
<head>
    <title>Movie App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MovieApp</div>

        <form class="search-bar">
            <input type="text" placeholder="Search movies...">
            <button type="submit">Search</button>
        </form>
    
        <button class="browse-btn" id="browseBtn">Browse</button>
    
        <div class="side-menu" id="sideMenu">
            <ul>
                <li><a href="#">Genres</a></li>
                <li><a href="#">Trending</a></li>
                <li><a href="#">Top Rated</a></li>
                <li><a href="#">Now Playing</a></li>
            </ul>
        </div>
    </header>
    

    <section class="banner">
        <div class="banner-content">
            <h1>Discover Your Next Favorite Movie</h1>
            <p>Explore the world of movies and TV shows.</p>
        </div>
    </section>

    <section class="movie-list">
        <h2>Trending Movies</h2>
        <div class="movies">
            <div class="movie-card">
                <img src="movie1.jpg" alt="Movie 1">
                <h3>Movie Title 1</h3>
            </div>
            <div class="movie-card">
                <img src="movie2.jpg" alt="Movie 2">
                <h3>Movie Title 2</h3>
            </div>
            <div class="movie-card">
                <img src="movie3.jpg" alt="Movie 3">
                <h3>Movie Title 3</h3>
            </div>
            <div class="movie-card">
                <img src="movie4.jpg" alt="Movie 4">
                <h3>Movie Title 4</h3>
            </div>
        </div>
    </section>

    <script src="script.js"></script>

      
    <footer>
        <p>&copy; 2025 MovieApp, All Rights Reserved</p>
    </footer>
</body>
</html>
